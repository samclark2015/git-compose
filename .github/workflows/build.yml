name: Build

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build linux/arm64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o git-compose-linux-arm64 ./cmd/git-compose

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-compose-linux-arm64
          path: git-compose-linux-arm64
          retention-days: 30

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: git-compose-linux-arm64
