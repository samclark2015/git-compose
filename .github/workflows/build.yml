name: Build

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    name: Build linux/arm64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate CalVer tag
        id: calver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          base=$(date -u +%Y.%m)
          count=$(gh api "repos/${{ github.repository }}/git/refs/tags" --jq "[.[].ref | select(startswith(\"refs/tags/$base.\"))] | length")
          echo "tag=$base.$((count + 1))" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w -X main.githubRepo=${{ github.repository }} -X main.version=${{ steps.calver.outputs.tag }}" -o git-compose-linux-arm64 ./cmd/git-compose

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-compose-linux-arm64
          path: git-compose-linux-arm64
          retention-days: 30

      - name: Create release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.calver.outputs.tag }}
          files: git-compose-linux-arm64
